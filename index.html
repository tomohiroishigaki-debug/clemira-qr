<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLEMIRA</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .logo-wrap {
      opacity:0;
      animation:fadeIn 0.4s ease forwards;
    }
    .logo-wrap img { width:240px; max-width:70vw; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="https://cdn.shopify.com/s/files/1/0925/8467/3562/files/clemira_wlogo.png?v=1751280954"
         alt="CLEMIRA"
         onerror="this.style.display='none'">
  </div>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwl_YbK39nElTUCIY1wKt4zEl7oAuh2GEAfw4zI5wc6EGhVv2rKiAyD3jtDNJFuvjHxPQ/exec";
    const BASE_URL = "https://clemira.jp/pages/infomercial";

    const UTM_MAP = {
      "infoma_5min_A":  "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial&utm_content=5min_A",
      "infoma_5min_B":  "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial&utm_content=5min_B",
      "infoma_5min_Ap": "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial&utm_content=5min_Ap",
      "infoma_5min_Bp": "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial&utm_content=5min_Bp",
      "infoma_29min_A": "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial&utm_content=29min_A",
      "infoma_29min_C": "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial&utm_content=29min_C",
    };

    const params = new URLSearchParams(window.location.search);
    const src = params.get("src") || "不明";
    const utm = UTM_MAP[src] || "utm_source=infoma&utm_medium=qr&utm_campaign=infomercial";
    const redirectURL = BASE_URL + "?" + utm;

    // GASに記録
    fetch(GAS_URL + "?src=" + encodeURIComponent(src) + "&ua=" + encodeURIComponent(navigator.userAgent), {
      mode: "no-cors"
    });

    // 0.8秒後にリダイレクト
    setTimeout(function() {
      window.location.replace(redirectURL);
    }, 800);
  </script>
</body>
</html>
